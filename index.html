<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradesConnect — Michigan Pilot</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --tc-black:#141210;--tc-dark:#1C1814;--tc-card:#242018;--tc-card2:#2C2620;
      --tc-blue:#3B82F6;--tc-blue-dim:#1D4ED8;
      --tc-orange:#E8520A;--tc-orange-light:rgba(232,82,10,0.15);
      --tc-green:#22C55E;--tc-green-dim:#15803D;--tc-green-bg:rgba(34,197,94,0.12);
      --tc-border:rgba(255,255,255,0.08);--tc-border2:rgba(255,255,255,0.14);
      --tc-text:#F5F0EA;--tc-muted:#9B8E84;--tc-subtle:#6B5F57;
    }
    html,body{height:100%;background:var(--tc-black);color:var(--tc-text);font-family:'DM Sans',sans-serif}
    .screen{display:none}.screen.active{display:block}
    .brand{font-weight:600;font-size:1.25rem;letter-spacing:-0.3px}
    .brand span{color:var(--tc-blue)}
    .landing-hero{background:var(--tc-black);padding:3rem 1.5rem 2rem;text-align:center}
    .landing-eyebrow{font-size:0.68rem;letter-spacing:0.12em;color:var(--tc-muted);text-transform:uppercase;margin-bottom:1rem}
    .landing-title{font-size:2.8rem;font-weight:700;line-height:1.1;margin-bottom:1rem;letter-spacing:-1px}
    .landing-title span{color:var(--tc-blue)}
    .landing-sub{font-size:0.95rem;color:var(--tc-muted);max-width:320px;margin:0 auto 2rem;line-height:1.7}
    .stats-bar{background:var(--tc-blue-dim);padding:1.1rem 1.5rem;display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem}
    @media(max-width:600px){.stats-bar{grid-template-columns:repeat(2,1fr)}}
    .stat-item{text-align:center}
    .stat-item .snum{font-size:1.3rem;font-weight:600;color:#fff}
    .stat-item .slbl{font-size:0.62rem;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-top:2px}
    .role-section{padding:1.5rem;max-width:560px;margin:0 auto}
    .role-prompt{text-align:center;font-size:0.8rem;color:var(--tc-muted);margin-bottom:1rem}
    .role-cards{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem}
    .role-card{border:1px solid var(--tc-border2);border-radius:12px;padding:1.75rem 1rem;cursor:pointer;transition:all 0.18s;text-align:center;background:var(--tc-card)}
    .role-card:hover{border-color:var(--tc-blue);background:rgba(59,130,246,0.08)}
    .role-card .rc-icon{font-size:2rem;margin-bottom:0.6rem}
    .role-card .rc-title{font-size:0.95rem;font-weight:600;color:var(--tc-text);margin-bottom:0.25rem}
    .role-card .rc-sub{font-size:0.78rem;color:var(--tc-muted);line-height:1.5}
    .pilot-note{text-align:center;font-size:0.72rem;color:var(--tc-subtle);padding:1.25rem 0 2rem}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:0.85rem 1.25rem;border-bottom:1px solid var(--tc-border);background:var(--tc-black);position:sticky;top:0;z-index:10}
    .topbar-role-badge{font-size:0.7rem;font-weight:500;padding:3px 9px;border-radius:20px}
    .topbar-role-badge.prospect{background:rgba(59,130,246,0.18);color:var(--tc-blue);border:0.5px solid rgba(59,130,246,0.3)}
    .topbar-role-badge.org{background:var(--tc-orange-light);color:#F97316;border:0.5px solid rgba(232,82,10,0.3)}
    .switch-btn{font-size:0.72rem;color:var(--tc-muted);cursor:pointer;border:none;background:none;text-decoration:underline;font-family:'DM Sans',sans-serif}
    .org-banner{padding:0.55rem 1.25rem;background:rgba(59,130,246,0.1);border-bottom:1px solid rgba(59,130,246,0.2)}
    .org-banner-text{font-size:0.75rem;font-weight:500;color:var(--tc-blue)}
    .tab-bar{display:flex;border-bottom:1px solid var(--tc-border);background:var(--tc-black);position:sticky;top:52px;z-index:9}
    .tab{flex:1;padding:0.75rem 0.5rem;text-align:center;font-size:0.8rem;font-weight:500;color:var(--tc-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
    .tab.active{color:var(--tc-blue);border-bottom-color:var(--tc-blue)}
    .tab-content{display:none;padding:1.25rem;background:var(--tc-black)}
    .tab-content.active{display:block}
    .filter-strip{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1.25rem}
    .chip{font-size:0.74rem;padding:5px 13px;border-radius:20px;border:1px solid var(--tc-border2);cursor:pointer;color:var(--tc-muted);background:var(--tc-card);transition:all 0.12s;font-family:'DM Sans',sans-serif}
    .chip.active{background:var(--tc-blue);color:#fff;border-color:var(--tc-blue)}
    .prog-card{border:1px solid var(--tc-border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:0.85rem;background:var(--tc-card)}
    .prog-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.5rem;gap:0.5rem}
    .prog-name{font-weight:500;font-size:0.93rem;color:var(--tc-text)}
    .prog-badge{font-size:0.68rem;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;background:rgba(255,255,255,0.07);color:var(--tc-muted)}
    .prog-badge.hiring{background:rgba(59,130,246,0.18);color:var(--tc-blue)}
    .prog-meta{font-size:0.77rem;color:var(--tc-muted);margin-bottom:0.6rem;line-height:1.6}
    .prog-tags{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.75rem}
    .tag{font-size:0.68rem;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,0.06);color:var(--tc-muted)}
    .prog-desc{font-size:0.8rem;color:var(--tc-muted);margin-bottom:0.75rem;line-height:1.55}
    .interest-btn{width:100%;padding:0.58rem;border-radius:8px;border:1px solid var(--tc-blue);background:transparent;color:var(--tc-blue);font-size:0.83rem;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif}
    .interest-btn:hover{background:var(--tc-blue);color:#fff}
    .interest-btn.sent{background:var(--tc-green-bg);border-color:var(--tc-green-dim);color:var(--tc-green);cursor:default}
    .profile-hero{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem}
    .avatar-lg{width:62px;height:62px;border-radius:50%;background:var(--tc-blue-dim);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:600;color:#fff;flex-shrink:0}
    .profile-name{font-weight:600;font-size:1.05rem;color:var(--tc-text)}
    .profile-sub{font-size:0.78rem;color:var(--tc-muted);line-height:1.5}
    .avail-dot{display:inline-flex;align-items:center;gap:4px;font-size:0.73rem;color:var(--tc-green);margin-top:3px}
    .avail-dot::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--tc-green)}
    .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-bottom:1.25rem}
    .stat-box{background:var(--tc-card);border:1px solid var(--tc-border);border-radius:10px;padding:0.75rem;text-align:center}
    .stat-num{font-size:1.25rem;font-weight:600;color:var(--tc-blue)}
    .stat-lbl{font-size:0.68rem;color:var(--tc-muted);margin-top:2px}
    .section-label{font-size:0.67rem;font-weight:500;color:var(--tc-subtle);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.75rem}
    .cert-list{display:flex;flex-direction:column;gap:0.45rem;margin-bottom:1.25rem}
    .cert-item{display:flex;align-items:center;gap:0.6rem;font-size:0.83rem;color:var(--tc-text)}
    .cert-check{font-size:0.75rem;color:var(--tc-green)}
    .portfolio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-bottom:1.25rem}
    .port-tile{aspect-ratio:1;border-radius:8px;background:var(--tc-card2);display:flex;align-items:center;justify-content:center;border:1px solid var(--tc-border);cursor:pointer;font-size:0.65rem;color:var(--tc-muted);text-align:center;padding:0.3rem}
    .add-tile{border-style:dashed;font-size:1.5rem;color:var(--tc-blue)}
    .about-box{background:var(--tc-card);border:1px solid var(--tc-border);border-radius:10px;padding:1rem;margin-bottom:1.25rem;font-size:0.83rem;color:var(--tc-muted);line-height:1.65}
    .edit-field{width:100%;padding:0.6rem 0.8rem;border-radius:8px;border:1px solid var(--tc-border2);background:var(--tc-card);font-family:'DM Sans',sans-serif;font-size:0.83rem;color:var(--tc-text);margin-bottom:0.75rem;resize:none}
    .edit-field:focus{outline:none;border-color:var(--tc-blue)}
    .outline-btn{padding:0.55rem 1rem;border-radius:8px;border:1px solid var(--tc-border2);background:transparent;color:var(--tc-muted);font-size:0.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
    .primary-btn{padding:0.55rem 1.2rem;border-radius:8px;background:var(--tc-blue);color:#fff;border:none;font-size:0.82rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
    .dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.6rem;margin-bottom:1.5rem}
    .dash-stat{background:var(--tc-card);border:1px solid var(--tc-border);border-radius:10px;padding:0.85rem 1rem}
    .dash-stat-num{font-size:1.5rem;font-weight:600;color:var(--tc-blue)}
    .dash-stat-lbl{font-size:0.68rem;color:var(--tc-muted);margin-top:2px}
    .pipeline-stage{margin-bottom:0.85rem}
    .stage-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.35rem}
    .stage-name{font-size:0.78rem;color:var(--tc-muted)}
    .stage-count{font-size:0.75rem;font-weight:500;color:var(--tc-text)}
    .stage-bar{height:5px;border-radius:3px;background:rgba(255,255,255,0.07)}
    .stage-fill{height:100%;border-radius:3px}
    .lead-card{display:flex;align-items:center;gap:0.75rem;padding:0.85rem 0;border-bottom:1px solid var(--tc-border)}
    .lead-card:last-child{border-bottom:none}
    .avatar-sm{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;flex-shrink:0}
    .lead-info{flex:1}
    .lead-name{font-size:0.86rem;font-weight:500;color:var(--tc-text)}
    .lead-meta{font-size:0.73rem;color:var(--tc-muted);line-height:1.5}
    .act-btn{font-size:0.7rem;padding:4px 10px;border-radius:6px;border:1px solid var(--tc-border2);background:transparent;cursor:pointer;color:var(--tc-muted);font-family:'DM Sans',sans-serif;white-space:nowrap}
    .act-btn.primary{background:var(--tc-blue);border-color:var(--tc-blue);color:#fff}
    .act-btn.done{background:var(--tc-green-bg);border-color:var(--tc-green-dim);color:var(--tc-green)}
